<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Sayfa Bulunamadı - Trendyol Satıcı Rehberi</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .error-container {
        text-align: center;
        max-width: 500px;
      }
      .error-code {
        font-size: 6rem;
        font-weight: 800;
        background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      h1 {
        font-size: 1.5rem;
        color: #1f2937;
        margin: 1rem 0 0.5rem;
      }
      p {
        color: #6b7280;
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      .btn {
        display: inline-block;
        background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
        color: white;
        padding: 1rem 2rem;
        border-radius: 0.75rem;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
      }
      .btn-secondary {
        background: #374151;
        margin-left: 0.75rem;
      }
      .btn-secondary:hover {
        box-shadow: 0 8px 25px rgba(55, 65, 81, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="error-code">404</div>
      <h1>Sayfa Bulunamadı</h1>
      <p>Aradığınız sayfa mevcut değil veya taşınmış olabilir. Ana sayfaya veya blog rehberine dönebilirsiniz.</p>
      <a href="/" class="btn">Ana Sayfa</a>
      <a href="/blog.html" class="btn btn-secondary">E-ticaret Rehberi</a>
    </div>
  </body>
</html>
