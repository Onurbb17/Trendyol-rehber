<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Dizine Ekle — Sitemap Bildirimi</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f9fafb;
        padding: 2rem;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: white;
        max-width: 480px;
        padding: 2.5rem;
        border-radius: 1rem;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border: 1px solid #e5e7eb;
      }
      h1 { font-size: 1.5rem; color: #1f2937; margin-bottom: 0.5rem; }
      p { color: #6b7280; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%);
        color: white;
        padding: 1rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        font-size: 1rem;
        text-decoration: none;
        border: none;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(26, 115, 232, 0.4);
      }
      .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
      .btn-secondary {
        background: #f3f4f6;
        color: #374151;
        margin-top: 1rem;
      }
      .btn-secondary:hover { background: #e5e7eb; box-shadow: none; }
      .success { color: #059669; font-weight: 600; margin-top: 1rem; }
      .links { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e5e7eb; }
      .links a { color: #1a73e8; font-size: 0.875rem; text-decoration: none; }
      .links a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🔍 Dizine Ekle — Tek Tıkla</h1>
      <p>Sitemap'inizdeki tüm sayfaları Google ve Bing'e bildirmek için aşağıdaki butona tıklayın. Arama motorları sitemap'i tarayıp yeni sayfaları keşfedecektir.</p>

      <button id="google-btn" class="btn">
        <span>📤</span>
        <span>Google'a Sitemap Bildir</span>
      </button>
      <div id="google-msg"></div>

      <button id="bing-btn" class="btn btn-secondary">
        <span>📤</span>
        <span>Bing'e Sitemap Bildir</span>
      </button>
      <div id="bing-msg"></div>

      <div class="links">
        <p style="font-size: 0.8rem; color: #9ca3af; margin-bottom: 0.5rem;">Manuel işlemler:</p>
        <a href="https://search.google.com/search-console" target="_blank" rel="noopener">Google Search Console →</a><br>
        <a href="https://www.bing.com/webmasters" target="_blank" rel="noopener" style="margin-top: 0.25rem; display: inline-block;">Bing Webmaster Tools →</a>
      </div>
    </div>

    <script>
      var sitemapUrl = 'https://trendyolrehber.com/sitemap.xml';
      var googlePing = 'https://www.google.com/ping?sitemap=' + encodeURIComponent(sitemapUrl);
      var bingPing = 'https://www.bing.com/ping?sitemap=' + encodeURIComponent(sitemapUrl);

      document.getElementById('google-btn').onclick = function() {
        window.open(googlePing, '_blank', 'noopener');
        document.getElementById('google-msg').innerHTML = '<span class="success">✓ Google\'a bildirim gönderildi. Sitemap tarandıktan sonra sayfalar dizine eklenecektir.</span>';
      };

      document.getElementById('bing-btn').onclick = function() {
        window.open(bingPing, '_blank', 'noopener');
        document.getElementById('bing-msg').innerHTML = '<span class="success">✓ Bing\'e bildirim gönderildi.</span>';
      };
    </script>
  </body>
</html>
