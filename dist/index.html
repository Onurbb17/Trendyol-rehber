    <script>
      // Wait for the React app to load, then insert the blog CTA section
      setTimeout(function() {
        // Find a suitable place to insert the blog CTA
        const rootElement = document.getElementById("root");
        if (rootElement && rootElement.children.length > 0) {
          // Create the blog CTA section
          const blogCTASection = document.createElement("div");
          blogCTASection.className = "blog-cta-section";
          blogCTASection.innerHTML = `
            <h1 class="blog-cta-title">E-ticaret Başarınızı Artırın</h1>
            <p class="blog-cta-description">
              Doğru kar hesaplaması yapmak, e-ticaret işinizde sürdürülebilir büyüme için temel gereksinimdir. 
              Trendyol kar hesaplayıcımızı kullanarak bilinçli fiyatlandırma kararları alın ve rekabet avantajı elde edin.
            </p>
            <a href="blog.html" class="blog-cta-button">
              <span>📖</span>
              <span>E-ticaret Rehberimizi İnceleyin</span>
            </a>
          `;
          
          // Try to insert after the main calculator content
          const mainContent = rootElement.querySelector("main") || rootElement.firstElementChild;
          if (mainContent && mainContent.parentNode) {
            mainContent.parentNode.insertBefore(blogCTASection, mainContent.nextSibling);
          } else {
            // Fallback: append to root
            rootElement.appendChild(blogCTASection);
          }
        }
      }, 2000); // Wait 2 seconds for React to load
    </script>
